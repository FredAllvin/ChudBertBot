<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChudBertBot — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#0e0e10] min-h-screen text-[#efeff1]">

    <!-- Header -->
    <header class="bg-[#1f1f23] border-b border-[#2a2a35] sticky top-0 z-10">
        <div class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between">

            <!-- Logo + name -->
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-[#9147ff] rounded-lg flex items-center justify-center flex-shrink-0">
                    <svg class="w-4 h-4 text-white" viewBox="0 0 512 512" fill="currentColor">
                        <path d="M391.17,103.47H352.54v109.7h38.63ZM285,103H246.37V212.75H285ZM120.33,0,24.86,91.45V420.56H140.14V512l95.51-91.44h76.69L487.14,256V0ZM449.07,237.75l-76.69,73.17H295.7L210.29,395V310.92H132.77V36.58H449.07Z"/>
                    </svg>
                </div>
                <span class="font-bold text-base">ChudBertBot</span>
            </div>

            <!-- User + logout -->
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <img th:if="${profilePicture != null}"
                         th:src="${profilePicture}"
                         class="w-7 h-7 rounded-full border border-[#2a2a35]"
                         alt="avatar">
                    <div th:unless="${profilePicture != null}"
                         class="w-7 h-7 bg-[#9147ff] rounded-full flex items-center justify-center text-xs font-bold flex-shrink-0"
                         th:text="${#strings.toUpperCase(#strings.substring(username, 0, 1))}">U</div>
                    <span class="text-[#adadb8] text-sm hidden sm:block" th:text="${username}">username</span>
                </div>
                <a href="/logout"
                   class="text-[#adadb8] hover:text-white text-sm transition-colors px-3 py-1.5 rounded-md hover:bg-[#2a2a35]">
                    Sign out
                </a>
            </div>

        </div>
    </header>

    <!-- Main -->
    <main class="max-w-5xl mx-auto px-6 py-8 flex flex-col gap-6">

        <!-- Stats -->
        <div class="grid grid-cols-3 gap-4">

            <div class="bg-[#1f1f23] border border-[#2a2a35] rounded-xl p-5">
                <p class="text-[#6b6b7a] text-xs uppercase tracking-wider font-medium">Commands</p>
                <p class="text-3xl font-bold mt-2 text-[#efeff1]" th:text="${commands.size()}">0</p>
            </div>

            <div class="bg-[#1f1f23] border border-[#2a2a35] rounded-xl p-5">
                <p class="text-[#6b6b7a] text-xs uppercase tracking-wider font-medium">Status</p>
                <div class="flex items-center gap-2 mt-2">
                    <span class="relative flex h-2.5 w-2.5">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-400"></span>
                    </span>
                    <p class="text-base font-semibold">Online</p>
                </div>
            </div>

            <div class="bg-[#1f1f23] border border-[#2a2a35] rounded-xl p-5">
                <p class="text-[#6b6b7a] text-xs uppercase tracking-wider font-medium">Channels</p>
                <p class="text-3xl font-bold mt-2 text-[#efeff1]" th:text="${channels}">0</p>
            </div>

        </div>

        <!-- Commands -->
        <div class="bg-[#1f1f23] border border-[#2a2a35] rounded-xl overflow-hidden">

            <div class="px-6 py-4 border-b border-[#2a2a35] flex items-center justify-between">
                <h2 class="font-semibold text-base">Commands</h2>
                <span class="text-[#6b6b7a] text-xs bg-[#2a2a35] px-2.5 py-1 rounded-full"
                      th:text="${commands.size()} + ' total'">0 total</span>
            </div>

            <!-- Empty state -->
            <div th:if="${commands.isEmpty()}" class="px-6 py-16 flex flex-col items-center gap-2 text-center">
                <div class="w-12 h-12 bg-[#2a2a35] rounded-full flex items-center justify-center mb-2">
                    <svg class="w-6 h-6 text-[#6b6b7a]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25z"/>
                    </svg>
                </div>
                <p class="text-[#adadb8] font-medium">No commands yet</p>
                <p class="text-[#6b6b7a] text-sm">Commands added to the bot will appear here.</p>
            </div>

            <!-- Commands table -->
            <table th:unless="${commands.isEmpty()}" class="w-full text-sm">
                <thead>
                    <tr class="border-b border-[#2a2a35]">
                        <th class="px-6 py-3 text-left text-[#6b6b7a] text-xs uppercase tracking-wider font-medium w-40">Trigger</th>
                        <th class="px-6 py-3 text-left text-[#6b6b7a] text-xs uppercase tracking-wider font-medium">Description</th>
                    </tr>
                </thead>
                <tbody class="divide-y divide-[#2a2a35]">
                    <tr th:each="cmd : ${commands}" class="hover:bg-[#2a2a35]/50 transition-colors">
                        <td class="px-6 py-4">
                            <code class="font-mono font-semibold text-[#9147ff]" th:text="${cmd.trigger}">!cmd</code>
                        </td>
                        <td class="px-6 py-4 text-[#adadb8]" th:text="${cmd.description}">Description</td>
                    </tr>
                </tbody>
            </table>

        </div>

    </main>

</body>
</html>
