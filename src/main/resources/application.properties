spring.application.name=ChudbertBot

# --- Twitch Bot Configuration ---
# ALL sensitive values MUST come from environment variables.
# Never put real credentials in this file — it is committed to git.
twitch.bot-username=${TWITCH_BOT_USERNAME}
twitch.oauth-token=${TWITCH_OAUTH_TOKEN}
twitch.client-id=${TWITCH_CLIENT_ID}
twitch.client-secret=${TWITCH_CLIENT_SECRET}

# Comma-separated channels to join at startup (e.g., mychannel,otherchannel).
# Defaults to empty — bot starts but joins no channel — if the env var is absent.
twitch.channels=${TWITCH_CHANNELS:}

# Logging: use INFO in production.
# Temporarily switch personal.chudbertbot to DEBUG locally to trace message receipt.
# WARN for Twitch4J prevents token-adjacent data appearing in log streams.
logging.level.personal.chudbertbot=INFO
logging.level.com.github.twitch4j=WARN
logging.level.com.github.philippheuer=WARN

# Optional: URL of the channel's pajbot instance (takes priority if set).
# Example: https://nymn.pajbot.com  (no trailing slash)
twitch.pajbot-url=${TWITCH_PAJBOT_URL:}

# Optional: Twitch user ID of the streamer, used with paj.pajbot.com when pajbotUrl is absent.
# Example: 62300805
twitch.streamer-id=${TWITCH_STREAMER_ID:}

# --- Web Dashboard ---
server.port=8080

# OAuth2 login via Twitch (OIDC). Redirect URI must be registered in dev.twitch.tv/console.
spring.security.oauth2.client.registration.twitch.client-id=${TWITCH_CLIENT_ID}
spring.security.oauth2.client.registration.twitch.client-secret=${TWITCH_CLIENT_SECRET}
spring.security.oauth2.client.registration.twitch.scope=openid
spring.security.oauth2.client.registration.twitch.redirect-uri={baseUrl}/login/oauth2/code/twitch
spring.security.oauth2.client.registration.twitch.authorization-grant-type=authorization_code
spring.security.oauth2.client.registration.twitch.client-name=Twitch

# Explicit URIs avoid a network call at startup (unlike issuer-uri discovery).
spring.security.oauth2.client.provider.twitch.authorization-uri=https://id.twitch.tv/oauth2/authorize
spring.security.oauth2.client.provider.twitch.token-uri=https://id.twitch.tv/oauth2/token
spring.security.oauth2.client.provider.twitch.jwk-set-uri=https://id.twitch.tv/oauth2/keys
spring.security.oauth2.client.provider.twitch.user-info-uri=https://id.twitch.tv/oauth2/userinfo
spring.security.oauth2.client.provider.twitch.user-name-attribute=preferred_username
